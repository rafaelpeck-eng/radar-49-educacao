<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Licitações · 49 Educação</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; }
        header h1 { font-size: 2.5rem; color: #00d9ff; margin-bottom: 10px; }
        .subtitle { color: #888; font-size: 1.1rem; }
        .controls { display: flex; gap: 15px; justify-content: center; margin: 20px 0; }
        .btn-primary {
            padding: 15px 30px; border: none; border-radius: 8px;
            font-size: 1rem; cursor: pointer; font-weight: bold;
            background: linear-gradient(135deg, #00d9ff, #0099cc);
            color: #000;
        }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 217, 255, 0.5); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .stat-card { background: #1f1f1f; padding: 20px; border-radius: 10px; text-align: center; border: 2px solid #333; }
        .stat-card.highlight { border-color: #00d9ff; }
        .stat-card.urgent { border-color: #ff6b6b; }
        .stat-card.closing { border-color: #ffd93d; }
        .stat-number { display: block; font-size: 3rem; font-weight: bold; color: #00d9ff; }
        .stat-label { color: #888; font-size: 0.9rem; }
        .filters { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
        .filter-btn { padding: 10px 20px; background: #333; border: 2px solid #444; color: #fff; border-radius: 20px; cursor: pointer; }
        .filter-btn.active { background: #00d9ff; color: #000; border-color: #00d9ff; }
        .filter-btn.urgent.active { background: #ff6b6b; border-color: #ff6b6b; }
        .filter-btn.closing.active { background: #ffd93d; color: #000; border-color: #ffd93d; }
        .loading { text-align: center; padding: 40px; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #00d9ff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .results { display: grid; gap: 15px; }
        .licitacao-card { background: #1f1f1f; padding: 20px; border-radius: 10px; border-left: 5px solid #00d9ff; }
        .licitacao-card.urgent { border-left-color: #ff6b6b; }
        .licitacao-card.closing { border-left-color: #ffd93d; }
        .licitacao-title { font-size: 1.2rem; color: #00d9ff; margin-bottom: 10px; }
        .licitacao-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 10px 0; }
        .info-item { background: #2a2a2a; padding: 8px; border-radius: 5px; font-size: 0.9rem; }
        .info-label { color: #888; font-size: 0.8rem; }
        .info-value { color: #fff; font-weight: bold; }
        .btn-view { padding: 8px 15px; background: #00d9ff; color: #000; border: none; border-radius: 5px; text-decoration: none; display: inline-block; }
        footer { text-align: center; padding: 30px; margin-top: 40px; border-top: 1px solid #333; color: #666; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Radar de Licitações</h1>
            <p class="subtitle">49 Educação - Startup University</p>
        </header>

        <div class="controls">
            <button id="btnScan" class="btn-primary" onclick="scanPortals()">
                🔍 VARRER PORTAIS AGORA
            </button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <span class="stat-number" id="totalFound">0</span>
                <span class="stat-label">Encontrados</span>
            </div>
            <div class="stat-card highlight">
                <span class="stat-number" id="highRelevance">0</span>
                <span class="stat-label">Alta Relevância</span>
            </div>
            <div class="stat-card urgent">
                <span class="stat-number" id="urgentDays">0</span>
                <span class="stat-label">Prazo ≤ 7 dias</span>
            </div>
            <div class="stat-card closing">
                <span class="stat-number" id="closingSoon">0</span>
                <span class="stat-label">Encerrando</span>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">TODOS</button>
            <button class="filter-btn" data-filter="high">ALTA RELEVÂNCIA</button>
            <button class="filter-btn urgent" data-filter="urgent">⚠️ URGENTES</button>
            <button class="filter-btn closing" data-filter="closing">ENCERRANDO</button>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>🔍 Buscando licitações nos portais...</p>
        </div>

        <div id="results" class="results"></div>

        <footer>
            <p>49EDUCAÇÃO · RADAR DE LICITAÇÕES</p>
            <p>Powered by Firecrawl + Vercel</p>
        </footer>
    </div>

    <script>
        let licitacoes = [];
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            setupFilters();
        });

        function setupFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderResults();
                });
            });
        }

        async function scanPortals() {
            const loading = document.getElementById('loading');
            const btnScan = document.getElementById('btnScan');
            const resultsDiv = document.getElementById('results');
            
            loading.classList.remove('hidden');
            resultsDiv.innerHTML = '';
            btnScan.disabled = true;
            btnScan.innerHTML = '🔍 BUSCANDO...';
            
            try {
                const response = await fetch('/api/scan');
                const data = await response.json();
                
                if (data.success) {
                    licitacoes = data.licitacoes;
                    updateStats();
                    renderResults();
                    
                    if (licitacoes.length === 0) {
                        resultsDiv.innerHTML = '<div class="loading"><p>🎯 Nenhuma licitação encontrada</p></div>';
                    }
                } else {
                    throw new Error('API retornou erro');
                }
            } catch (error) {
                console.error('Erro:', error);
                resultsDiv.innerHTML = '<div class="loading"><p>⚠️ Erro ao buscar licitações</p></div>';
            } finally {
                loading.classList.add('hidden');
                btnScan.disabled = false;
                btnScan.innerHTML = '🔍 VARRER PORTAIS AGORA';
            }
        }

        function updateStats() {
            document.getElementById('totalFound').textContent = licitacoes.length;
            document.getElementById('highRelevance').textContent = licitacoes.filter(l => l.relevance === 'high').length;
            document.getElementById('urgentDays').textContent = licitacoes.filter(l => l.status === 'urgent').length;
            document.getElementById('closingSoon').textContent = licitacoes.filter(l => l.status === 'closing').length;
        }

        function renderResults() {
            const resultsDiv = document.getElementById('results');
            let filtered = licitacoes;
            
            if (currentFilter === 'high') filtered = licitacoes.filter(l => l.relevance === 'high');
            else if (currentFilter === 'urgent') filtered = licitacoes.filter(l => l.status === 'urgent');
            else if (currentFilter === 'closing') filtered = licitacoes.filter(l => l.status === 'closing');
            
            if (filtered.length === 0 && licitacoes.length > 0) {
                resultsDiv.innerHTML = '<div class="loading"><p>🎯 Nenhuma licitação para este filtro</p></div>';
                return;
            }
            
            resultsDiv.innerHTML = filtered.map(l => `
                <div class="licitacao-card ${l.status}">
                    <h3 class="licitacao-title">${l.title}</h3>
                    <div class="licitacao-info">
                        <div class="info-item"><div class="info-label">Órgão</div><div class="info-value">${l.organo || l.portal}</div></div>
                        <div class="info-item"><div class="info-label">Valor</div><div class="info-value">${l.value}</div></div>
                        <div class="info-item"><div class="info-label">Prazo</div><div class="info-value">${formatDate(l.deadline)}</div></div>
                        <div class="info-item"><div class="info-label">Relevância</div><div class="info-value">${getRelevanceIcon(l.relevance)}</div></div>
                    </div>
                    <div style="margin-top: 15px;">
                        <a href="${l.url}" target="_blank" class="btn-view">Ver Detalhes</a>
                    </div>
                </div>
            `).join('');
        }

        function formatDate(dateString) {
            if (!dateString || dateString === 'Não informado') return '⚠️ Não informado';
            try {
                const date = new Date(dateString);
                const daysLeft = Math.ceil((date - new Date()) / (1000 * 60 * 60 * 24));
                if (daysLeft <= 0) return '⚠️ VENCIDO';
                if (daysLeft <= 7) return `⚠️ ${daysLeft} dias`;
                return date.toLocaleDateString('pt-BR');
            } catch { return dateString; }
        }

        function getRelevanceIcon(relevance) {
            const icons = { 'high': '🔥 Alta', 'medium': '📊 Média', 'low': '📝 Baixa' };
            return icons[relevance] || relevance;
        }
    </script>
</body>
</html>
