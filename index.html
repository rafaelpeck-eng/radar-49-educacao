<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Licitações · 49 Educação</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --fundo: #0E0E0F;
            --cards: #161618;
            --elementos: #1E1E21;
            --borda: #2A2A2E;
            --texto: #EFEFEF;
            --texto2: #666666;
            --laranja: #FF4D00;
            --verde: #00C853;
            --vermelho: #FF4040;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--fundo);
            color: var(--texto);
            min-height: 100vh;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--borda);
            margin-bottom: 30px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-badge {
            background: var(--laranja);
            color: white;
            font-weight: 700;
            font-size: 1.5rem;
            padding: 10px 15px;
            border-radius: 8px;
        }
        
        .logo h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
        }
        
        .logo .subtitle {
            color: var(--laranja);
            font-size: 0.9rem;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-secondary {
            background: var(--elementos);
            color: var(--texto);
            border: 1px solid var(--borda);
        }
        
        .config-panel {
            background: var(--cards);
            border: 1px solid var(--borda);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            display: none;
        }
        
        .config-panel.active { display: block; }
