<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de Editais · 49 Educação</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0E0E0F;
            color: #EFEFEF;
            line-height: 1.6;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px 0;
            border-bottom: 1px solid #2A2A2E;
            margin-bottom: 40px;
        }
        .logo-badge {
            background: #FF4D00;
            color: white;
            font-weight: 700;
            font-size: 1.5rem;
            padding: 10px 15px;
            border-radius: 8px;
        }
        h1 { font-size: 1.8rem; }
        .upload-section {
            background: #161618;
            border: 2px dashed #2A2A2E;
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            margin-bottom: 30px;
        }
        .btn-primary {
            background: #FF4D00;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-primary:hover { background: #FF6A2A; }
        .results { display: none; }
        .results.active { display: block; }
        .result-card {
            background: #161618;
            border: 1px solid #2A2A2E;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .checklist { list-style: none; margin: 15px 0; }
        .checklist li {
            padding: 10px 0;
            border-bottom: 1px solid #2A2A2E;
        }
        .check { color: #00C853; }
        .cross { color: #FF4040; }
        .proposta-box {
            background: #1E1E21;
            padding: 20px;
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            margin: 20px 0;
        }
        .btn-copy {
            background: #FF4D00;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .back-link {
            color: #666;
            text-decoration: none;
            margin-top: 30px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-badge">49</div>
            <div>
                <h1>ANALISADOR DE EDITAIS</h1>
                <div style="color: #FF4D00;">49 Educação · Startup University</div>
            </div>
        </header>

        <div class="upload-section">
            <h2>📄 Upload do Edital (PDF)</h2>
            <p style="color: #666; margin: 20px 0;">Arraste o arquivo ou clique para selecionar</p>
            <input type="file" id="fileInput" accept=".pdf" style="display: none;">
            <button class="btn-primary" onclick="document.getElementById('fileInput').click()">
                📁 Selecionar PDF
            </button>
            <button class="btn-primary" id="btnAnalyze" onclick="analyzeEdital()" style="display: none; margin-left: 10px;">
                🤖 ANALISAR COM IA
            </button>
        </div>

        <div class="results" id="results">
            <div class="result-card">
                <h3>🎯 Viabilidade</h3>
                <div id="viability" style="font-size: 2rem; color: #FF4D00; text-align: center; margin: 20px 0;"></div>
            </div>

            <div class="result-card">
                <h3>✅ Documentos que a 49 Educação JÁ TEM</h3>
                <ul class="checklist" id="documentosTem"></ul>
            </div>

            <div class="result-card">
                <h3>⚠️ Documentos que FALTAM</h3>
                <ul class="checklist" id="documentosFaltam"></ul>
            </div>

            <div class="result-card">
                <h3>📝 Minuta de Proposta</h3>
                <div class="proposta-box" id="propostaText"></div>
                <button class="btn-copy" onclick="copiarProposta()">📋 Copiar Proposta</button>
            </div>
        </div>

        <a href="index.html" class="back-link">← Voltar ao Radar</a>
    </div>

    <script>
        let selectedFile = null;

        document.getElementById('fileInput').addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                document.getElementById('btnAnalyze').style.display = 'inline-block';
            }
        });

        async function analyzeEdital() {
            if (!selectedFile) return;

            document.getElementById('uploadSection').style.display = 'none';
            document.getElementById('results').classList.remove('active');

            // Simulação para teste (remover quando API estiver pronta)
            setTimeout(() => {
                document.getElementById('results').classList.add('active');
                document.getElementById('viability').textContent = '85%';
                
                document.getElementById('documentosTem').innerHTML = `
                    <li><span class="check">✓</span> CNPJ ativo</li>
                    <li><span class="check">✓</span> Contrato Social</li>
                    <li><span class="check">✓</span> Atestados de capacidade técnica</li>
                `;
                
                document.getElementById('documentosFaltam').innerHTML = `
                    <li><span class="cross">✗</span> CND Federal</li>
                    <li><span class="cross">✗</span> CND Estadual</li>
                `;
                
                document.getElementById('propostaText').textContent = `
PROPOSTA TÉCNICA - 49 EDUCAÇÃO LTDA

CNPJ: 35.611.694/0001-88

1. APRESENTAÇÃO DA EMPRESA

A 49 Educação LTDA, com NPS +94 e reconhecimento TOP 1 Educação pela Associação Brasileira de Startups, é a primeira Startup University do Brasil, com metodologia registrada na Biblioteca Nacional (Livro nº 888.433).

2. EXPERIÊNCIA COMPROVADA

+5.000 startups capacitadas
+1.200 startups catarinenses impactadas desde 2023
+R$ 1 bilhão em valuation gerado

Cases de sucesso:
- Taskdo (EXIT para Invent Software em 2024)
- Empregga Tecnologia
- Realize Educação
- Instituto Visão (+15% retenção escolar)

3. METODOLOGIA

Utilizamos a metodologia Startup University, com foco em educação empreendedora, aceleração de startups e capacitação em inovação.

4. EQUIPE TÉCNICA

Leandro Piazza dos Santos - CEO e Mentor Top 3 do Brasil
Ana Cláudia Plentz - Coordenadora Pedagógica

5. RESULTADOS ESPERADOS

Capacitação de empreendedores com foco em resultados práticos e mensuráveis.
                `;
            }, 1000);
        }

        function copiarProposta() {
            const texto = document.getElementById('propostaText').textContent;
            navigator.clipboard.writeText(texto).then(() => {
                alert('✅ Proposta copiada!');
            });
        }
    </script>
</body>
</html>
